name: CI/CD Pipeline

on:
  push:
    branches: [ studies ]
  pull_request:
    branches: [ studies ]

jobs:
    test-lint:
        name: Test and Push
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USER }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}
                  
            - name: Create dummy .env
                run: |
                  touch .env
                  echo "SECRET_KEY=test_key_for_ci" >> .env
                  echo "DEBUG=True" >> .env
                  # Adicione aqui outras variáveis que seu Django EXIJE para iniciar
                  # Ex: DATABASE_URL, ALLOWED_HOSTS, etc.

            - name: Build and Test
              run: |
                  docker compose build
                  docker compose --env-file .env.example run web python manage.py test

            - name: Push to Docker Hub
              # Este passo só roda se o teste anterior passar
              run: docker compose push web